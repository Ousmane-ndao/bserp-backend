name: Build, Push to Docker Hub & Deploy to Render

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  DOCKER_HUB_REGISTRY: docker.io
  DOCKER_IMAGE_NAME: ${{ secrets.DOCKER_HUB_USERNAME }}/bserp-backend

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bserp_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_pgsql, mbstring, zip, bcmath, gd
          tools: composer
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Setup environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run migrations
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_DATABASE: bserp_test
          DB_USERNAME: postgres
          DB_PASSWORD: password
        run: php artisan migrate --force

      - name: Run tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_DATABASE: bserp_test
          DB_USERNAME: postgres
          DB_PASSWORD: password
        run: php artisan test --no-coverage

  push-to-docker-hub:
    needs: build-and-test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.DOCKER_IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE_NAME }}:buildcache,mode=max

  trigger-render-deploy:
    needs: push-to-docker-hub
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Render deployment
        uses: actions/github-script@v7
        with:
          script: |
            const webhook_url = '${{ secrets.RENDER_DEPLOY_HOOK }}';
            if (!webhook_url) {
              console.warn('⚠️  RENDER_DEPLOY_HOOK secret not configured. Render will pull the latest image on next deployment.');
              return;
            }
            
            try {
              const response = await fetch(webhook_url, { method: 'POST' });
              if (response.ok) {
                console.log('✅ Render deployment triggered successfully');
              } else {
                console.warn(`⚠️  Render webhook returned status: ${response.status}`);
              }
            } catch (error) {
              console.error('❌ Failed to trigger Render deployment:', error);
            }
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Render
        run: |
          curl -X POST "https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"full"}'

      - name: Notify deployment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Deployment to Render completed successfully! 🚀\nImage: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}'
            })
