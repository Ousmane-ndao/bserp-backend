[www]
listen = /var/run/php-fpm.sock
listen.owner = nobody
listen.group = nobody
listen.mode = 0660

user = nobody
group = nobody

pm = dynamic
pm.max_children = 20
pm.start_servers = 5
pm.min_spare_servers = 2
pm.max_spare_servers = 10
pm.max_requests = 1000

clear_env = no

access.log = /proc/self/fd/2
error_log = /proc/self/fd/2
