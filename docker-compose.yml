version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bserp-postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE:-bserp}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bserp-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - APP_NAME=BSERP
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-bserp}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-password}
    volumes:
      - .:/app
      - /app/vendor
      - /app/storage
    ports:
      - "8000:80"
    networks:
      - bserp

volumes:
  postgres_data:

networks:
  bserp:
    driver: bridge
